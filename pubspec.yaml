name: nhasixapp
description: "A new Flutter project."
publish_to: "none"
version: 0.9.23+33

environment:
  sdk: ^3.5.4
  
# Platform-specific builds (Android only)
platforms:
  android:

workspace:
  - packages/kuron_core
  - packages/kuron_generic
  - packages/kuron_special
  - packages/kuron_config_generator
  - packages/kuron_native
  - packages/kuron_native/example

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core Flutter & State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^9.2.0

  # Local Packages
  kuron_core:
    path: ./packages/kuron_core
  kuron_generic:
    path: ./packages/kuron_generic
  kuron_native:
    path: ./packages/kuron_native

  # Code Generation & Immutability
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Networking & Web Scraping
  dio: ^5.9.0
  native_dio_adapter: ^1.3.0
  cronet_http: ^1.9.0
  html: ^0.15.6
  connectivity_plus: ^7.0.0

  # Navigation & Routing
  go_router: ^17.3.0

  # Local Storage & Caching
  sqflite: ^2.3.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.1
  path: ^1.9.0

  # Image Handling & Caching
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  extended_image: ^10.0.1  # Enhanced image viewer with gesture control
  # extended_image_library: ^5.0.1  # Disk-cache utilities (getCachedImageFile)
  image: ^4.5.4
  flutter_cache_manager: ^3.4.1
  waterfall_flow: ^3.1.1  # Pinterest-style masonry grid layout

  # UI Components & Fonts
  google_fonts: ^8.1.0

  # Background Tasks & Notifications
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0
  wakelock_plus: ^1.5.2

  # File Management & Sharing
  archive: ^4.0.7
  open_file: ^3.5.7
  share_plus: ^13.2.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^10.3.0

  # WebView for Cloudflare bypass
  webview_flutter: ^4.14.0

  # Utilities
  logger: ^2.6.2
  permission_handler: ^12.0.1
  intl: ^0.20.2
  device_info_plus: ^13.2.0
  collection: ^1.18.0
  crypto: ^3.0.3

  # PDF Generation
  pdf: ^3.11.1

  package_info_plus: ^10.2.0
  markdown_widget: ^2.3.2+8
  flutter_svg: ^2.2.3
  scrollable_positioned_list: ^0.3.8
  kuron_special:
    path: packages/kuron_special
  cookie_jar: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  melos: ^8.0.0
  mocktail: ^1.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/images/
    - assets/images/flags/
    - assets/icons/
    - assets/legal/en/
    - assets/legal/id/
    - assets/configs/
    # Note: tags.json.gz (compressed) is 1.1MB vs tags.json (5MB)

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: false  # iOS platform not configured
  image_path: "assets/icons/Frame.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/Frame.png"

melos:
  sdkPath: .fvm/flutter_sdk
  scripts:
    bootstrap:
      run: melos exec -- fvm flutter pub get
      description: Run pub get in all packages
    analyze:
      run: melos exec -- fvm flutter analyze --no-fatal-infos
      description: Run flutter analyze in all packages
    test:
      run: melos exec -- fvm flutter test
      description: Run tests in all packages
      packageFilters:
        dirExists: test
    format:
      run: melos exec -- fvm dart format .
      description: Format all Dart files
    codegen:
      run: fvm flutter pub run build_runner build --delete-conflicting-outputs
      description: Run build_runner codegen on root app
    codegen:pkg:
      run: melos exec -- fvm flutter pub run build_runner build --delete-conflicting-outputs
      description: Run build_runner codegen on targeted package(s)
      packageFilters:
        dependsOn:
          - build_runner
    clean:
      run: melos exec -- fvm flutter clean
      description: Run flutter clean in all packages
    outdated:
      run: melos exec -- fvm flutter pub outdated
      description: Check outdated dependencies in all packages
